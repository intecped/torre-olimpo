<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Torre Olimpo">
<meta name="theme-color" content="#1A237E">
<title>Torre Olimpo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --navy:#1A237E;--navy-dark:#0D1757;--navy-light:#283593;
  --green:#2E7D32;--green-bg:#E8F5E9;--green-text:#1B5E20;
  --orange:#E65100;--orange-bg:#FFF3E0;--orange-text:#BF360C;
  --red:#B71C1C;--red-bg:#FFEBEE;--red-text:#7F0000;
  --gray:#757575;--gray-bg:#F5F5F5;--gray-text:#424242;
  --blue-bg:#E8EAF6;--blue-text:#283593;
  --white:#FFFFFF;--surface:#F8F9FF;--border:#E8EAF0;
  --text:#1A1A2E;--text2:#5C5C7A;--text3:#9898B0;
  --radius:14px;--radius-sm:8px;--radius-pill:999px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--surface);font-family:var(--font);color:var(--text)}
img{display:block}

/* ── Layout ─────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;background:var(--white);position:relative;overflow:hidden}
.topbar{background:var(--navy);color:#fff;padding:48px 20px 16px;flex-shrink:0}
.topbar-row{display:flex;align-items:center;gap:10px}
.topbar h1{font-size:18px;font-weight:600;letter-spacing:-.3px;flex:1}
.topbar .sub{font-size:12px;opacity:.65;margin-top:2px}
.topbar .dt{font-size:12px;font-family:var(--mono);background:rgba(255,255,255,.15);padding:4px 10px;border-radius:var(--radius-pill)}

/* sync status */
.sync-bar{display:flex;align-items:center;gap:6px;padding:6px 20px;font-size:11px;font-weight:600;background:rgba(255,255,255,.08);color:rgba(255,255,255,.75);flex-shrink:0;min-height:26px;transition:background .3s}
.sync-bar.syncing{background:rgba(255,193,7,.15);color:#FFD54F}
.sync-bar.error{background:rgba(183,28,28,.2);color:#EF9A9A}
.sync-bar.ok{background:rgba(46,125,50,.15);color:#A5D6A7}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.sync-bar.syncing .sync-dot{animation:pulse .8s infinite alternate}
@keyframes pulse{to{opacity:.2}}

.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(72px + var(--safe-bottom))}

/* ── Bottom nav ──────────────────────────── */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:calc(64px + var(--safe-bottom));background:var(--white);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;z-index:50}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:var(--font);font-weight:500;transition:color .15s;position:relative}
.bn-btn i{font-size:22px;transition:color .15s}
.bn-btn.active{color:var(--navy)}
.bn-btn .nb{position:absolute;top:2px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;font-weight:600;padding:1px 5px;border-radius:var(--radius-pill);min-width:16px;text-align:center}

/* ── Pages ───────────────────────────────── */
.page{display:none;padding:16px}.page.active{display:block}

/* ── Search ──────────────────────────────── */
.search-wrap{display:flex;gap:8px;margin-bottom:14px}
.search-wrap input{flex:1;padding:10px 14px 10px 38px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:var(--font);color:var(--text);background:var(--surface);outline:none;transition:border .15s}
.search-wrap input:focus{border-color:var(--navy)}
.search-ico{position:absolute;left:30px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.search-rel{position:relative;flex:1}
.fsel{padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);color:var(--text);background:var(--surface);outline:none}

/* ── Floor cards ─────────────────────────── */
.floor-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.floor-hdr{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;user-select:none;transition:background .1s}
.floor-hdr:active{background:var(--surface)}
.fbadge{background:var(--navy);color:#fff;font-size:11px;font-weight:600;padding:4px 11px;border-radius:var(--radius-pill);min-width:72px;text-align:center;font-family:var(--mono)}
.fpw{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.fpb{height:100%;border-radius:3px;transition:width .4s}
.fpct{font-size:12px;font-family:var(--mono);font-weight:500;color:var(--text2);min-width:32px;text-align:right}
.fchev{color:var(--text3);font-size:18px;transition:transform .2s;flex-shrink:0}.fchev.open{transform:rotate(180deg)}
.floor-body{display:none;border-top:1px solid var(--border)}.floor-body.open{display:block}

/* ── Etapa rows ──────────────────────────── */
.erow{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border)}.erow:last-child{border-bottom:none}
.eico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.einfo{flex:1;min-width:0}
.ename{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.edate{font-size:11px;color:var(--text3);margin-top:2px}
.eacts{display:flex;align-items:center;gap:6px;flex-shrink:0}
.sbadge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:var(--radius-pill);white-space:nowrap;letter-spacing:.2px}
.sc{background:var(--green-bg);color:var(--green-text)}
.sa{background:var(--orange-bg);color:var(--orange-text)}
.sat{background:var(--red-bg);color:var(--red-text)}
.sp{background:var(--gray-bg);color:var(--gray-text)}
.btr{width:32px;height:32px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text2);flex-shrink:0;transition:all .15s}
.btr:active{transform:scale(.92)}
.btr.done{background:var(--green);border-color:var(--green);color:#fff}
.btr.cam{background:var(--blue-bg);border-color:#C5CAE9;color:var(--blue-text)}
.pthumb{width:34px;height:34px;border-radius:8px;object-fit:cover;cursor:pointer;border:1.5px solid var(--border);flex-shrink:0}

/* ── KPI cards ───────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kcard{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.klbl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.4px}
.kval{font-size:28px;font-weight:600;font-family:var(--mono);letter-spacing:-1px}
.ksub{font-size:11px;color:var(--text3);margin-top:2px}
.kvg{color:var(--green)}.kvo{color:var(--orange)}.kvr{color:var(--red)}.kvgr{color:var(--gray)}

/* ── Progress bars ───────────────────────── */
.psec{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.psec-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.4px}
.prow{display:flex;align-items:center;gap:10px;margin-bottom:9px}.prow:last-child{margin-bottom:0}
.plbl{font-size:12px;color:var(--text);width:82px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbw{flex:1;height:7px;background:var(--surface);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.pbar{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.pnum{font-size:11px;font-family:var(--mono);color:var(--text2);width:30px;text-align:right;flex-shrink:0}

/* ── Modal ───────────────────────────────── */
.mwrap{display:none;position:absolute;inset:0;background:rgba(10,10,30,.55);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.mwrap.open{display:flex}
.mbox{background:var(--white);border-radius:24px 24px 0 0;padding:20px 20px calc(20px + var(--safe-bottom));width:100%;max-height:90vh;overflow-y:auto}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.mtitle{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--text);display:flex;align-items:center;gap:8px}
.mfield{margin-bottom:13px}
.mfield label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.mfield input,.mfield textarea,.mfield select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:var(--font);color:var(--text);background:var(--surface);outline:none;transition:border .15s;-webkit-appearance:none}
.mfield input:focus,.mfield textarea:focus,.mfield select:focus{border-color:var(--navy);background:var(--white)}
.mfield textarea{height:72px;resize:none}
.macts{display:flex;gap:10px;margin-top:16px}
.btn{padding:12px 20px;border-radius:var(--radius);font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text);flex:1;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btnp{background:var(--navy);border-color:var(--navy);color:#fff}
.btnp:active{background:var(--navy-dark)}

/* ── Photo upload ────────────────────────── */
.uarea{border:2px dashed var(--border);border-radius:var(--radius);padding:18px;text-align:center;cursor:pointer;position:relative;transition:all .15s}
.uarea:active,.uarea:hover{border-color:var(--navy);background:var(--blue-bg)}
.uarea input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.uarea i{font-size:28px;color:var(--text3);margin-bottom:6px;display:block}
.uarea p{font-size:13px;color:var(--text2);font-weight:500}
.uarea small{font-size:11px;color:var(--text3)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.pitem{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.pitem img{width:100%;height:100%;object-fit:cover;cursor:pointer}
.pdel{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(183,28,28,.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px}

/* ── Lightbox ────────────────────────────── */
.lbwrap{display:none;position:absolute;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.lbwrap.open{display:flex}
.lbwrap img{max-width:calc(100% - 40px);max-height:65vh;border-radius:12px;object-fit:contain}
.lbclose{position:absolute;top:52px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px}
.lbnav{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px}
.lb-controls{display:flex;align-items:center;gap:16px}
.lbcap{color:rgba(255,255,255,.6);font-size:12px;font-family:var(--mono)}

/* ── Alerts ──────────────────────────────── */
.alert-sec{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.alert-hdr{display:flex;align-items:center;gap:8px;padding:13px 16px;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.alert-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-top:1px solid var(--border)}
.alert-ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}

/* ── Fotos page ──────────────────────────── */
.fotos-section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.fotos-hdr{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.fotos-hdr span{font-size:14px;font-weight:600;color:var(--navy);flex:1}
.fotos-body{padding:14px}
.etapa-fotos{margin-bottom:14px}.etapa-fotos:last-child{margin-bottom:0}
.etapa-fotos-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;display:flex;align-items:center;gap:5px}

/* ── Relatório page ──────────────────────── */
.rpanel{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.rpanel-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.4px}
.rchkrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.rchkrow:last-child{border-bottom:none}
.rchkrow input[type=checkbox]{width:17px;height:17px;cursor:pointer;accent-color:var(--navy);flex-shrink:0}
.rchkrow label{font-size:13px;color:var(--text);cursor:pointer;flex:1;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.rchkrow label strong{font-weight:600}
.gen-btn{width:100%;padding:15px;border-radius:var(--radius);background:var(--navy);color:#fff;border:none;font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .15s;letter-spacing:-.2px}
.gen-btn:active{background:var(--navy-dark);transform:scale(.98)}
.sel-btns{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.sel-btn{padding:7px 13px;border-radius:var(--radius-pill);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text2);transition:all .15s}
.sel-btn:active{background:var(--surface)}
.succ-banner{background:var(--green-bg);border:1px solid #A5D6A7;border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:10px;margin-top:12px}
.succ-banner i{font-size:22px;color:var(--green);flex-shrink:0}
.succ-banner div{font-size:13px;color:var(--green-text);font-weight:500;line-height:1.5}
.succ-banner small{font-size:11px;color:var(--green-text);opacity:.8}

/* ── Tela de Login ───────────────────────── */
.login-overlay{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:500;padding:24px}
.login-overlay.hidden{display:none}
.login-box{background:var(--white);border-radius:24px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo i{font-size:48px;color:var(--navy);display:block;margin-bottom:8px}
.login-logo h2{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.login-logo p{font-size:13px;color:var(--text2);margin-top:4px}
.login-field{margin-bottom:14px}
.login-field label{font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.login-field input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:15px;font-family:var(--font);color:var(--text);background:var(--surface);outline:none;transition:border .15s}
.login-field input:focus{border-color:var(--navy);background:var(--white)}
.login-btn{width:100%;padding:15px;border-radius:var(--radius);background:var(--navy);color:#fff;border:none;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;transition:background .15s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:9px;letter-spacing:-.2px}
.login-btn:active{background:var(--navy-dark)}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-err{font-size:13px;color:var(--red);font-weight:600;text-align:center;margin-top:12px;min-height:20px}
.logout-btn{background:none;border:1.5px solid rgba(255,255,255,.3);color:rgba(255,255,255,.8);padding:4px 12px;border-radius:var(--radius-pill);font-size:11px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .15s}
.logout-btn:active{background:rgba(255,255,255,.15)}

.pcbadge{background:var(--blue-bg);color:var(--blue-text);font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--radius-pill)}
.todaytag{background:var(--blue-bg);color:var(--blue-text);font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--radius-pill)}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty i{font-size:40px;display:block;margin-bottom:12px;opacity:.35}
.empty p{font-size:14px;line-height:1.6}
.spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Login Overlay -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-logo">
      <i class="ti ti-building-skyscraper" aria-hidden="true"></i>
      <h2>Torre Olimpo</h2>
      <p>Acompanhamento de obras</p>
    </div>
    <div class="login-field">
      <label>Usuário</label>
      <input type="text" id="ln-user" placeholder="Seu usuário" autocomplete="username" autocapitalize="none">
    </div>
    <div class="login-field">
      <label>Senha</label>
      <input type="password" id="ln-pass" placeholder="Sua senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-field">
      <label>Obra / Projeto</label>
      <input type="text" id="ln-obra" placeholder="Ex: Torre Olimpo — Bloco A" autocomplete="off">
    </div>
    <button class="login-btn" id="ln-btn" onclick="doLogin()">
      <i class="ti ti-login" aria-hidden="true"></i> Entrar
    </button>
    <div class="login-err" id="ln-err"></div>
  </div>
</div>

<div class="app">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-row">
      <i class="ti ti-building" style="font-size:20px;opacity:.8" aria-hidden="true"></i>
      <div style="flex:1">
        <h1>Torre Olimpo</h1>
        <div class="sub" id="topbar-sub">Gestão de serviços</div>
      </div>
      <span class="dt" id="today-label"></span>
      <button class="logout-btn" onclick="doLogout()" title="Sair">
        <i class="ti ti-logout" style="font-size:12px;vertical-align:-1px" aria-hidden="true"></i> Sair
      </button>
    </div>
  </div>

  <!-- Sync bar -->
  <div class="sync-bar" id="sync-bar">
    <div class="sync-dot"></div>
    <span id="sync-msg">Conectando...</span>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Andamento -->
    <div class="page active" id="page-andamento">
      <div class="search-wrap">
        <div class="search-rel">
          <i class="ti ti-search search-ico" aria-hidden="true"></i>
          <input type="text" placeholder="Buscar andar ou serviço..." id="srch" oninput="renderAndamento()">
        </div>
        <select class="fsel" id="fstatus" onchange="renderAndamento()">
          <option value="">Todos</option>
          <option value="concluido">✅ Concluído</option>
          <option value="andamento">🔄 Em andamento</option>
          <option value="atrasado">⚠️ Atrasado</option>
          <option value="pendente">⏳ Pendente</option>
        </select>
      </div>
      <div id="and-list"></div>
    </div>

    <!-- Dashboard -->
    <div class="page" id="page-dashboard">
      <div class="kpi-grid" id="kpi-grid"></div>
      <div class="psec">
        <div class="psec-title"><i class="ti ti-layers" aria-hidden="true"></i>Por andar</div>
        <div id="prog-and"></div>
      </div>
      <div class="psec">
        <div class="psec-title"><i class="ti ti-tool" aria-hidden="true"></i>Por etapa</div>
        <div id="prog-et"></div>
      </div>

<script>

// ═══════════════════════════════════════════════════════════════
//  CONFIGURAÇÃO FIXA — definida na hospedagem e no Drive
// ═══════════════════════════════════════════════════════════════
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbw-XVhJU9scttgiaYO18smFJFMmaqNab1rVvWq_Vs-THnFaWWQggO9JdenS4lZ8EjaE/exec';

// ── Login / Sessão ────────────────────────────────────────────
// Sessão salva no localStorage (permanente no dispositivo)
let SESSION = JSON.parse(localStorage.getItem('to_session') || 'null');
let CFG_USER = SESSION ? SESSION.usuario : '';

function checkSession(){
  if(SESSION){
    document.getElementById('login-overlay').classList.add('hidden');
    // Atualiza subtítulo da topbar com usuário e obra
    const sub = document.getElementById('topbar-sub');
    if(sub) sub.textContent = SESSION.obra ? SESSION.obra + ' · ' + SESSION.usuario : SESSION.usuario;
    return true;
  } else {
    document.getElementById('login-overlay').classList.remove('hidden');
    return false;
  }
}

async function doLogin(){
  const usuario = document.getElementById('ln-user').value.trim();
  const senha   = document.getElementById('ln-pass').value;
  const obra    = document.getElementById('ln-obra').value.trim();
  const err     = document.getElementById('ln-err');
  const btn     = document.getElementById('ln-btn');

  if(!usuario || !senha){ err.textContent='Preencha usuário e senha.'; return; }
  if(!obra){ err.textContent='Informe a obra / projeto.'; return; }

  err.textContent='';
  btn.disabled=true;
  btn.innerHTML='<i class="ti ti-loader-2" style="animation:spin .8s linear infinite" aria-hidden="true"></i> Verificando...';

  try {
    const res = await fetch(GAS_URL + '?acao=login&usuario=' + encodeURIComponent(usuario) + '&senha=' + encodeURIComponent(senha));
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if(data.ok){
      SESSION = { usuario: data.data.nome || usuario, obra, loginEm: new Date().toISOString() };
      CFG_USER = SESSION.usuario;
      localStorage.setItem('to_session', JSON.stringify(SESSION));
      checkSession();
      // Registra acesso na planilha
      apiPost({ acao:'registrarAcesso', usuario: SESSION.usuario, obra, acao2:'login' }).catch(()=>{});
      loadFromSheets();
    } else {
      err.textContent = data.erro || 'Usuário ou senha incorretos.';
    }
  } catch(ex){
    err.textContent = 'Erro de conexão. Tente novamente.';
    console.error(ex);
  }

  btn.disabled=false;
  btn.innerHTML='<i class="ti ti-login" aria-hidden="true"></i> Entrar';
}

function doLogout(){
  if(!confirm('Deseja sair?')) return;
  localStorage.removeItem('to_session');
  SESSION=null; CFG_USER='';
  document.getElementById('login-overlay').classList.remove('hidden');
  // Limpa campos para não expor dados
  document.getElementById('ln-pass').value='';
  document.getElementById('ln-err').textContent='';
}

// Estilo do spinner inline
const _sty=document.createElement('style');
_sty.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
document.head.appendChild(_sty);

// ── Dados estáticos (fallback / default) ─────────────────────
const DEFAULT_ANDARES = ['Lobby','3° Andar','4° Andar','5° Andar','6° Andar','7° Andar','8° Andar','9° Andar','10° Andar','11° Andar','12° Andar','13° Andar','14° Andar','15° Andar','16° Andar','17° Andar','18° Andar','19° Andar','20° Andar','21° Andar','22° Andar','23° Andar','24° Andar','25° Andar','26° Andar','27° Andar','28° Andar','29° Andar'];
const DEFAULT_ETAPAS  = ['Abertura da parede','Fechamento shaft','Fechamento parede','Fechamento lógica','Pintura'];
const DEFAULT_DATAS   = {'Lobby':'2026-06-02','3° Andar':'2026-06-02','4° Andar':'2026-06-03','5° Andar':'2026-06-04','6° Andar':'2026-06-05','7° Andar':'2026-06-06','8° Andar':'2026-06-07','9° Andar':'2026-06-08','10° Andar':'2026-06-09','11° Andar':'2026-06-10','12° Andar':'2026-06-11','13° Andar':'2026-06-12','14° Andar':'2026-06-13','15° Andar':'2026-06-14','16° Andar':'2026-06-15','17° Andar':'2026-06-16','18° Andar':'2026-06-17','19° Andar':'2026-06-18','20° Andar':'2026-06-19','21° Andar':'2026-06-20','22° Andar':'2026-06-21','23° Andar':'2026-06-22','24° Andar':'2026-06-23','25° Andar':'2026-06-24','26° Andar':'2026-06-25','27° Andar':'2026-06-26','28° Andar':'2026-06-27','29° Andar':'2026-06-28'};
const ICONS = {'Abertura da parede':'ti-wall','Fechamento shaft':'ti-door','Fechamento parede':'ti-barrier-block','Fechamento lógica':'ti-plug-connected','Pintura':'ti-paint'};

let ANDARES = [...DEFAULT_ANDARES];
let ETAPAS  = [...DEFAULT_ETAPAS];
let DATAS   = {...DEFAULT_DATAS};

const today = new Date(); today.setHours(0,0,0,0);
const todayStr = today.toISOString().slice(0,10);
document.getElementById('today-label').textContent = today.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});

// ── Estado local ──────────────────────────────────────────────
let D = {}; // { "Andar::Etapa": { status, dataConclusao, obs, fotos:[] } }

function key(a,e){ return a+'::'+e; }

function initD(){
  ANDARES.forEach(a => {
    ETAPAS.forEach(e => {
      if(!D[key(a,e)]) D[key(a,e)] = {status:autoS(a), dataConclusao:'', obs:'', fotos:[]};
    });
  });
}

function autoS(a){
  const p = new Date((DATAS[a]||todayStr)+'T00:00:00');
  if(p < today) return 'atrasado';
  if(p.getTime()===today.getTime()) return 'andamento';
  return 'pendente';
}

function getS(a,e){
  const d = D[key(a,e)];
  if(!d) return 'pendente';
  return d.dataConclusao ? 'concluido' : d.status;
}

function si(s){
  const m={
    concluido:{l:'Concluído',c:'sc',col:'#2E7D32',bg:'#E8F5E9',i:'ti-circle-check'},
    andamento:{l:'Em andamento',c:'sa',col:'#E65100',bg:'#FFF3E0',i:'ti-refresh'},
    atrasado:{l:'Atrasado',c:'sat',col:'#B71C1C',bg:'#FFEBEE',i:'ti-alert-circle'},
    pendente:{l:'Pendente',c:'sp',col:'#9E9E9E',bg:'#F5F5F5',i:'ti-clock'}
  };
  return m[s]||m.pendente;
}

function fpct(a){
  let d=0;
  ETAPAS.forEach(e=>{ if(getS(a,e)==='concluido') d++; });
  return Math.round(d/ETAPAS.length*100);
}

// ── Sync bar ──────────────────────────────────────────────────
function setSyncBar(state, msg){
  const bar = document.getElementById('sync-bar');
  bar.className = 'sync-bar ' + state;
  document.getElementById('sync-msg').textContent = msg;
}

// ── Google Sheets API ─────────────────────────────────────────
// ── Camada de comunicação com o Apps Script ───────────────────
// GET simples (sem headers customizados) → sem preflight CORS
async function apiGet(acao){
  const r = await fetch(GAS_URL + '?acao=' + acao);
  if(!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// POST com Content-Type: text/plain → sem preflight CORS
async function apiPost(body){
  const r = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// ── Carrega tudo em uma única chamada GET ─────────────────────
async function loadFromSheets(forceNotify=false){
  if(!GAS_URL){ setSyncBar('error','URL do Apps Script não configurada'); return; }
  setSyncBar('syncing','Carregando dados do Sheets...');
  try {
    const res = await apiGet('tudo');
    if(!res.ok) throw new Error(res.erro || 'Erro desconhecido');

    const { andares, etapas, servicos, fotos } = res.data;

    // Aplica configuração de andares e etapas
    if(andares && andares.length){
      ANDARES = andares.map(a => a.Andar);
      DATAS   = {};
      andares.forEach(a => {
        // DataPrevista pode vir como "2026-06-02T00:00:00.000Z" ou "2026-06-02"
        DATAS[a.Andar] = (a.DataPrevista || todayStr).split('T')[0];
      });
    }
    if(etapas && etapas.length){
      ETAPAS = etapas.map(e => e.Etapa);
    }

    initD(); // garante estrutura para todos os pares

    // Aplica status e observações
    (servicos || []).forEach(s => {
      const k = key(s.Andar, s.Etapa);
      if(D[k]){
        if(s.Status)        D[k].status        = s.Status;
        if(s.DataConclusao) D[k].dataConclusao = s.DataConclusao;
        if(s.Obs)           D[k].obs           = s.Obs;
      }
    });

    // Agrupa fotos por andar+etapa
    // Cada item usa `url` (link do Drive) — não base64
    (fotos || []).forEach(f => {
      const k = key(f.Andar, f.Etapa);
      if(D[k]){
        if(!D[k].fotos) D[k].fotos = [];
        D[k].fotos.push({ name: f.NomeFoto, url: f.Url, fileId: f.FileId, dataUpload: f.EnviadoEm, usuario: f.Usuario });
      }
    });

    setSyncBar('ok', 'Sincronizado · ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
    renderAll();
    if(forceNotify) showToast('Dados recarregados do Sheets!');
  } catch(ex){
    setSyncBar('error','Erro de conexão — verifique a URL');
    console.error(ex);
  }
}

// ── Salva status/obs de um serviço ────────────────────────────
async function pushItem(a, e){
  if(!GAS_URL) return;
  const d = D[key(a,e)];
  setSyncBar('syncing','Salvando...');
  try {
    const res = await apiPost({
      acao:          'salvarServico',
      Andar:         a,
      Etapa:         e,
      Status:        d.status,
      DataConclusao: d.dataConclusao,
      Obs:           d.obs,
      Usuario:       CFG_USER
    });
    if(res.ok) setSyncBar('ok','Salvo · '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
    else setSyncBar('error','Erro: ' + res.erro);
  } catch(ex){
    setSyncBar('error','Erro de rede');
  }
}

// ── Envia fotos novas ─────────────────────────────────────────
async function pushPhotos(a, e, newPhotos){
  if(!GAS_URL || !newPhotos.length) return;
  setSyncBar('syncing','Enviando ' + newPhotos.length + ' foto(s) para o Drive...');
  try {
    // Envia o base64 completo; o Apps Script salva no Drive e grava só a URL na planilha
    const res = await apiPost({
      acao:    'salvarFotos',
      Andar:   a,
      Etapa:   e,
      fotos:   newPhotos.map(f => ({ NomeFoto: f.name, Base64: f.src })),
      Usuario: CFG_USER
    });
    if(res.ok){
      const msg = 'Fotos salvas no Drive · ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      setSyncBar('ok', msg);
      if(res.data && res.data.rejeitadas && res.data.rejeitadas.length)
        showToast('Atenção: ' + res.data.rejeitadas.length + ' foto(s) não enviada(s)', 'error');
    } else {
      setSyncBar('error','Erro: ' + res.erro);
    }
  } catch(ex){
    setSyncBar('error','Erro de rede ao enviar fotos');
    console.error(ex);
  }
}

// ── Exclui foto remota ────────────────────────────────────────
async function deletePhotoRemote(a, e, idx){
  if(!GAS_URL) return;
  await apiPost({ acao: 'excluirFoto', Andar: a, Etapa: e, indice: idx });
}


// ── Modal ─────────────────────────────────────────────────────
let ET=null, mphotos=[], mNewPhotos=[];

function openModal(a,e){
  ET={a,e};
  const d=D[key(a,e)]||{};
  document.getElementById('modal-title-txt').textContent=a+' — '+e;
  document.getElementById('mstatus').value=d.status||'pendente';
  document.getElementById('mdate').value=d.dataConclusao||'';
  document.getElementById('mobs').value=d.obs||'';
  mphotos=[...(d.fotos||[])];
  mNewPhotos=[];
  renderMP();
  document.getElementById('modal').classList.add('open');
}

function closeModal(ev){
  if(!ev||ev.target===document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

async function saveModal(){
  const {a,e}=ET;
  const btn=document.getElementById('btn-salvar');
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader spin"></i> Salvando...';

  const prev = D[key(a,e)]||{};
  D[key(a,e)]={
    status:        document.getElementById('mstatus').value,
    dataConclusao: document.getElementById('mdate').value,
    obs:           document.getElementById('mobs').value,
    fotos:         mphotos.map(f => ({
      name:      f.name,
      url:       f.url   || f.src,  // fotos salvas têm url; novas ainda têm src (base64 local)
      src:       f.src   || '',     // mantido só para exibição local antes do reload
      fileId:    f.fileId || '',
      dataUpload: f.dataUpload || '',
      usuario:   f.usuario || CFG_USER
    }))
  };

  document.getElementById('modal').classList.remove('open');
  renderAll();

  // Push em paralelo
  await pushItem(a,e);
  if(mNewPhotos.length) await pushPhotos(a,e,mNewPhotos);

  btn.disabled=false; btn.innerHTML='Salvar';
}

// ── Upload de fotos ───────────────────────────────────────────
// Lê cada arquivo como base64 e exibe preview local.
// O arquivo real (qualidade original) é enviado ao Apps Script,
// que o salva no Google Drive e grava apenas a URL na planilha.
function lerArquivoComoBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Falha ao ler: ' + file.name));
    reader.onload  = ev => resolve({ src: ev.target.result, name: file.name });
    reader.readAsDataURL(file);
  });
}

async function handleUpload(ev){
  const files = [...ev.target.files];
  ev.target.value = '';
  if(!files.length) return;

  showToast('Lendo ' + files.length + ' foto(s)...');

  const resultados = await Promise.allSettled(files.map(f => lerArquivoComoBase64(f)));

  resultados.forEach((r, i) => {
    if(r.status === 'fulfilled'){
      mphotos.push(r.value);
      mNewPhotos.push(r.value);
    } else {
      showToast('Erro: ' + files[i].name, 'error');
    }
  });

  renderMP();
}

function renderMP(){
  document.getElementById('ph-prev').innerHTML=mphotos.map((p,i)=>{
    const exibir = p.url || p.src; // url = Drive; src = base64 local ainda não enviado
    return `<div class="pitem"><img src="${exibir}" alt="${p.name}" onclick="openLBM(${i})">
     <button class="pdel" onclick="delMP(${i})"><i class="ti ti-x" aria-hidden="true"></i></button></div>`;
  }).join('');
}

async function delMP(i){
  const {a,e}=ET;
  // Se a foto já estava salva no Sheets (não é nova), remove lá também
  const isNew = mphotos.length - mNewPhotos.length <= i;
  if(!isNew){
    const remoteIdx = i; // índice no Sheets
    deletePhotoRemote(a,e,remoteIdx);
  } else {
    mNewPhotos.splice(i-(mphotos.length-mNewPhotos.length),1);
  }
  mphotos.splice(i,1);
  renderMP();
}

function toggleCheck(a,e){
  const d=D[key(a,e)];
  if(getS(a,e)==='concluido'){ d.dataConclusao=''; d.status=autoS(a); }
  else{ d.dataConclusao=todayStr; d.status='concluido'; }
  renderAll();
  pushItem(a,e);
}

function toggleFloor(id){
  document.getElementById('fb-'+id).classList.toggle('open');
  document.getElementById('fc-'+id).classList.toggle('open');
}

// ── Andamento ─────────────────────────────────────────────────
function renderAndamento(){
  const q=document.getElementById('srch').value.toLowerCase();
  const fs=document.getElementById('fstatus').value;
  let html='';
  ANDARES.forEach((a,ai)=>{
    const mA=a.toLowerCase().includes(q);
    const ets=ETAPAS.filter(e=>(e.toLowerCase().includes(q)||mA)&&(!fs||getS(a,e)===fs));
    if(!ets.length&&q) return;
    const p=fpct(a); const bc=p===100?'#2E7D32':p>0?'#1A237E':'#9E9E9E';
    const id='f'+ai;
    html+=`<div class="floor-card">
      <div class="floor-hdr" onclick="toggleFloor('${id}')">
        <div class="fbadge">${a}</div>
        <div class="fpw"><div class="fpb" style="width:${p}%;background:${bc}"></div></div>
        <div class="fpct">${p}%</div>
        <i class="ti ti-chevron-down fchev" id="fc-${id}" aria-hidden="true"></i>
      </div>
      <div class="floor-body" id="fb-${id}">`;
    ets.forEach(e=>{
      const d=D[key(a,e)]||{}; const s=getS(a,e); const inf=si(s);
      
      const prevF=new Date((DATAS[a]||todayStr)+'T00:00:00').toLocaleDateString('pt-BR');
      const isT=DATAS[a]===todayStr;
      const pc=d.fotos?d.fotos.length:0;
      const th=pc>0?`<img class="pthumb" src="${d.fotos[0].url || d.fotos[0].src}" alt="foto" onclick="openLBS('${a}','${e}',0)">`:'' ;
      html+=`<div class="erow">
        <div class="eico" style="background:${inf.bg}"><i class="ti ${ICONS[e]||'ti-tool'}" style="color:${inf.col}" aria-hidden="true"></i></div>
        <div class="einfo">
          <div class="ename">${e}${pc>0?` <span class="pcbadge"><i class="ti ti-photo" style="font-size:9px" aria-hidden="true"></i> ${pc}</span>`:''}</div>
          <div class="edate">Prev: ${prevF}${isT?' <span class="todaytag">hoje</span>':''}${d.dataConclusao?' · Concl: '+new Date(d.dataConclusao+'T12:00:00').toLocaleDateString('pt-BR'):''}</div>
        </div>
        <div class="eacts">${th}<span class="sbadge ${inf.c}">${inf.l}</span>
          <button class="btr ${s==='concluido'?'done':''}" onclick="toggleCheck('${a}','${e}')" aria-label="Concluir">
            <i class="ti ${s==='concluido'?'ti-check':'ti-circle'}" aria-hidden="true"></i>
          </button>
          <button class="btr cam" onclick="openModal('${a}','${e}')" aria-label="Editar / foto">
            <i class="ti ti-camera" aria-hidden="true"></i>
          </button>
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  if(!html) html=`<div class="empty"><i class="ti ti-search" aria-hidden="true"></i><p>Nenhum resultado encontrado</p></div>`;
  document.getElementById('and-list').innerHTML=html;
}

// ── Dashboard ─────────────────────────────────────────────────
function renderDashboard(){
  let c={concluido:0,andamento:0,atrasado:0,pendente:0};
  ANDARES.forEach(a=>ETAPAS.forEach(e=>{ c[getS(a,e)]++; }));
  const tot=ANDARES.length*ETAPAS.length;
  document.getElementById('kpi-grid').innerHTML=[
    {k:'concluido',l:'Concluídos',cl:'kvg',i:'ti-circle-check'},
    {k:'andamento',l:'Em andamento',cl:'kvo',i:'ti-refresh'},
    {k:'atrasado',l:'Atrasados',cl:'kvr',i:'ti-alert-circle'},
    {k:'pendente',l:'Pendentes',cl:'kvgr',i:'ti-clock'}
  ].map(x=>`<div class="kcard"><div class="klbl"><i class="ti ${x.i}" style="font-size:13px" aria-hidden="true"></i>${x.l}</div><div class="kval ${x.cl}">${c[x.k]}</div><div class="ksub">${Math.round(c[x.k]/tot*100)}% do total</div></div>`).join('');
  document.getElementById('prog-and').innerHTML=ANDARES.map(a=>{
    const p=fpct(a);const cl=p===100?'#2E7D32':p>0?'#1A237E':'#C5CAE9';
    return`<div class="prow"><div class="plbl">${a}</div><div class="pbw"><div class="pbar" style="width:${p}%;background:${cl}"></div></div><div class="pnum">${p}%</div></div>`;
  }).join('');
  document.getElementById('prog-et').innerHTML=ETAPAS.map(e=>{
    let d=0; ANDARES.forEach(a=>{ if(getS(a,e)==='concluido') d++; });
    const p=Math.round(d/ANDARES.length*100);const cl=p===100?'#2E7D32':p>0?'#1A237E':'#C5CAE9';
    return`<div class="prow"><div class="plbl">${e}</div><div class="pbw"><div class="pbar" style="width:${p}%;background:${cl}"></div></div><div class="pnum">${p}%</div></div>`;
  }).join('');
}

// ── Alertas ───────────────────────────────────────────────────
function renderAlertas(){
  let atr=[],em=[];
  ANDARES.forEach(a=>ETAPAS.forEach(e=>{
    const s=getS(a,e);const pr=new Date((DATAS[a]||todayStr)+'T00:00:00');
    const di=Math.round((today-pr)/86400000);
    if(s==='atrasado') atr.push({a,e,di});
    if(s==='andamento') em.push({a,e});
  }));
  document.getElementById('abadge').textContent=atr.length;
  document.getElementById('abadge').style.display=atr.length?'inline':'none';
  let html='';
  if(atr.length){
    html+=`<div class="alert-sec"><div class="alert-hdr" style="background:#FFEBEE;color:#B71C1C"><i class="ti ti-alert-circle" aria-hidden="true"></i>${atr.length} serviço(s) atrasado(s)</div>`;
    atr.forEach(it=>{html+=`<div class="alert-row"><div class="alert-ico" style="background:#FFEBEE"><i class="ti ti-clock-x" style="color:#B71C1C" aria-hidden="true"></i></div><div class="einfo"><div class="ename" style="color:#B71C1C">${it.a} — ${it.e}</div><div class="edate">${it.di} dia(s) em atraso</div></div><button class="btn btnp" style="font-size:12px;padding:8px 12px;flex:0" onclick="openModal('${it.a}','${it.e}')">Atualizar</button></div>`;});
    html+=`</div>`;
  }
  if(em.length){
    html+=`<div class="alert-sec"><div class="alert-hdr" style="background:#FFF3E0;color:#E65100"><i class="ti ti-refresh" aria-hidden="true"></i>${em.length} em andamento hoje</div>`;
    em.forEach(it=>{html+=`<div class="alert-row"><div class="alert-ico" style="background:#FFF3E0"><i class="ti ti-tool" style="color:#E65100" aria-hidden="true"></i></div><div class="einfo"><div class="ename">${it.a} — ${it.e}</div><div class="edate">Previsto para hoje</div></div><button class="btn btnp" style="font-size:12px;padding:8px 12px;flex:0" onclick="openModal('${it.a}','${it.e}')">Atualizar</button></div>`;});
    html+=`</div>`;
  }
  if(!atr.length&&!em.length) html=`<div class="empty"><i class="ti ti-circle-check" style="color:#2E7D32;opacity:1" aria-hidden="true"></i><p style="color:#2E7D32;font-weight:600">Tudo em dia!</p></div>`;
  document.getElementById('alertas-list').innerHTML=html;
}

// ── Fotos ─────────────────────────────────────────────────────
function renderFotos(){
  let tot=0;let html='';
  ANDARES.forEach(a=>{
    let bl='';
    ETAPAS.forEach(e=>{
      const d=D[key(a,e)]||{};
      if(d.fotos&&d.fotos.length){
        tot+=d.fotos.length;
        bl+=`<div class="etapa-fotos">
          <div class="etapa-fotos-label"><i class="ti ${ICONS[e]||'ti-tool'}" aria-hidden="true"></i>${e}<span class="pcbadge">${d.fotos.length}</span>
            <button style="margin-left:auto;padding:3px 10px;border-radius:999px;border:1.5px solid var(--border);background:var(--white);font-size:11px;font-weight:600;cursor:pointer;color:var(--navy)" onclick="openModal('${a}','${e}')">+ Foto</button>
          </div>
          <div class="pgrid">${d.fotos.map((f,i)=>`<div class="pitem" onclick="openLBS('${a}','${e}',${i})"><img src="${f.url||f.src}" alt="${f.name}"></div>`).join('')}</div>
        </div>`;
      }
    });
    if(bl) html+=`<div class="fotos-section"><div class="fotos-hdr"><i class="ti ti-building" style="color:var(--navy);font-size:18px" aria-hidden="true"></i><span>${a}</span></div><div class="fotos-body">${bl}</div></div>`;
  });
  document.getElementById('ptbadge').textContent=tot;
  document.getElementById('ptbadge').style.display=tot?'inline':'none';
  if(!html) html=`<div class="empty"><i class="ti ti-photo-off" aria-hidden="true"></i><p>Nenhuma foto adicionada ainda.<br>Use o botão <i class="ti ti-camera" style="font-size:13px;vertical-align:-2px"></i> em qualquer serviço.</p></div>`;
  document.getElementById('fotos-list').innerHTML=html;
}

// ── Relatório ─────────────────────────────────────────────────
function renderRelChecklist(){
  document.getElementById('rel-checklist').innerHTML=ANDARES.map((a,i)=>{
    const p=fpct(a);const sc=p===100?'sc':p>0?'sa':'sp';const sl=p===100?'Concluído':p>0?'Em andamento':'Pendente';
    const pcs=ETAPAS.reduce((n,e)=>n+(D[key(a,e)]&&D[key(a,e)].fotos?D[key(a,e)].fotos.length:0),0);
    return`<div class="rchkrow">
      <input type="checkbox" id="rc${i}" value="${a}" checked>
      <label for="rc${i}">
        <strong>${a}</strong>
        <span class="sbadge ${sc}" style="font-size:9px">${sl} ${p}%</span>
        ${pcs>0?`<span class="pcbadge"><i class="ti ti-photo" style="font-size:9px" aria-hidden="true"></i> ${pcs}</span>`:''}
      </label>
    </div>`;
  }).join('');
}

function selAll(v){ ANDARES.forEach((_,i)=>{ const cb=document.getElementById('rc'+i);if(cb)cb.checked=v; }); }
function selConcluidos(){ ANDARES.forEach((a,i)=>{ const cb=document.getElementById('rc'+i);if(cb)cb.checked=fpct(a)===100; }); }

function gerarRelatorio(){
  const titulo=document.getElementById('rel-titulo').value||'Relatório de Serviços — Torre Olimpo';
  const resp=document.getElementById('rel-resp').value;
  const incFotos=document.getElementById('rel-fotos').checked;
  const incObs=document.getElementById('rel-obs').checked;
  const incPen=document.getElementById('rel-pen').checked;
  const dataNow=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  const hora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const andSel=ANDARES.filter((_,i)=>{ const cb=document.getElementById('rc'+i);return cb&&cb.checked; });
  if(!andSel.length){showToast('Selecione pelo menos um andar.','error');return;}
  let tot=0,conc=0,atr=0;
  andSel.forEach(a=>ETAPAS.forEach(e=>{tot++;const s=getS(a,e);if(s==='concluido')conc++;if(s==='atrasado')atr++;}));
  const sBg={concluido:'#E8F5E9',andamento:'#FFF3E0',atrasado:'#FFEBEE',pendente:'#F5F5F5'};
  const sCol={concluido:'#1B5E20',andamento:'#BF360C',atrasado:'#7F0000',pendente:'#424242'};
  const sLbl={concluido:'Concluído',andamento:'Em andamento',atrasado:'Atrasado',pendente:'Pendente'};
  let body='';
  andSel.forEach(a=>{
    const p=fpct(a);
    const rows=ETAPAS.map(e=>{
      const d=D[key(a,e)]||{};const s=getS(a,e);
      if(!incPen&&s==='pendente') return '';
      const prevF=new Date((DATAS[a]||todayStr)+'T00:00:00').toLocaleDateString('pt-BR');
      const conclF=d.dataConclusao?new Date(d.dataConclusao+'T12:00:00').toLocaleDateString('pt-BR'):'—';
      const obsH=incObs&&d.obs?`<div style="background:#F8F9FA;border-left:3px solid #CFD8DC;padding:7px 11px;margin-top:7px;border-radius:0 4px 4px 0;font-size:12px;color:#455A64"><b>Obs:</b> ${d.obs}</div>`:'';
      const ftsH=incFotos&&d.fotos&&d.fotos.length?`<div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:9px">${d.fotos.map(f=>`<img src="${f.src}" style="width:110px;height:82px;object-fit:cover;border-radius:6px;border:1px solid #E0E0E0">`).join('')}</div>`:'';
      return`<tr style="border-bottom:1px solid #F0F0F0;vertical-align:top">
        <td style="padding:10px 12px;font-size:13px;min-width:150px">${e}</td>
        <td style="padding:10px 12px"><span style="background:${sBg[s]};color:${sCol[s]};font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px">${sLbl[s]}</span></td>
        <td style="padding:10px 12px;font-size:12px;color:#616161">${prevF}</td>
        <td style="padding:10px 12px;font-size:12px;color:${s==='concluido'?'#1B5E20':'#616161'};font-weight:${s==='concluido'?700:400}">${conclF}</td>
        <td style="padding:10px 12px">${obsH}${ftsH}</td>
      </tr>`;
    }).join('');
    body+=`<div style="page-break-inside:avoid;margin-bottom:24px">
      <div style="background:#1A237E;color:#fff;padding:13px 18px;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:15px;font-weight:700">${a}</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:12px;opacity:.8">${p}% concluído</span>
          <div style="width:80px;height:5px;background:rgba(255,255,255,.25);border-radius:3px;overflow:hidden"><div style="width:${p}%;height:100%;background:#fff;border-radius:3px"></div></div>
        </div>
      </div>
      <table style="width:100%;border-collapse:collapse;border:1px solid #E0E0E0;border-top:none;font-family:Arial,sans-serif">
        <thead><tr style="background:#F5F5F5">
          <th style="padding:9px 12px;text-align:left;font-size:11px;color:#757575;font-weight:700;text-transform:uppercase;letter-spacing:.3px">Serviço</th>
          <th style="padding:9px 12px;text-align:left;font-size:11px;color:#757575;font-weight:700;text-transform:uppercase;letter-spacing:.3px">Status</th>
          <th style="padding:9px 12px;text-align:left;font-size:11px;color:#757575;font-weight:700;text-transform:uppercase;letter-spacing:.3px">Previsto</th>
          <th style="padding:9px 12px;text-align:left;font-size:11px;color:#757575;font-weight:700;text-transform:uppercase;letter-spacing:.3px">Conclusão</th>
          <th style="padding:9px 12px;text-align:left;font-size:11px;color:#757575;font-weight:700;text-transform:uppercase;letter-spacing:.3px">Detalhes</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });
  const htmlRel=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${titulo}</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:#F5F5F5;color:#212121;padding:20px}@media print{body{background:#fff;padding:0}.noprint{display:none}}</style>
</head><body>
<div style="max-width:900px;margin:0 auto">
  <div style="background:#1A237E;color:#fff;padding:24px 28px;border-radius:10px;margin-bottom:22px">
    <h1 style="font-size:20px;font-weight:700;margin-bottom:8px">${titulo}</h1>
    <div style="font-size:13px;opacity:.85;display:flex;flex-wrap:wrap;gap:16px">
      <span>Emitido em: ${dataNow} às ${hora}</span>
      ${resp?`<span>Responsável: ${resp}</span>`:''}
      <span>Andares selecionados: ${andSel.length}</span>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px">
    <div style="background:#E8F5E9;border-radius:8px;padding:16px;text-align:center"><div style="font-size:11px;color:#1B5E20;font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px">Concluídos</div><div style="font-size:30px;font-weight:700;color:#1B5E20">${conc}</div><div style="font-size:11px;color:#2E7D32">${Math.round(conc/tot*100)}% do total</div></div>
    <div style="background:#FFEBEE;border-radius:8px;padding:16px;text-align:center"><div style="font-size:11px;color:#7F0000;font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px">Atrasados</div><div style="font-size:30px;font-weight:700;color:#7F0000">${atr}</div><div style="font-size:11px;color:#B71C1C">${Math.round(atr/tot*100)}% do total</div></div>
    <div style="background:#E8EAF6;border-radius:8px;padding:16px;text-align:center"><div style="font-size:11px;color:#283593;font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px">Total serviços</div><div style="font-size:30px;font-weight:700;color:#283593">${tot}</div><div style="font-size:11px;color:#3949AB">${andSel.length} andares</div></div>
  </div>
  ${body}
  <div style="margin-top:24px;padding-top:14px;border-top:1px solid #E0E0E0;text-align:center;font-size:11px;color:#9E9E9E">Torre Olimpo · ${dataNow} às ${hora}${resp?' · '+resp:''}</div>
</div>
<div class="noprint" style="position:fixed;bottom:20px;right:20px">
  <button onclick="window.print()" style="background:#1A237E;color:#fff;border:none;padding:12px 22px;border-radius:10px;font-size:14px;cursor:pointer;font-weight:700;font-family:Arial">Imprimir / Salvar PDF</button>
</div>
</body></html>`;
  const blob=new Blob([htmlRel],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a2=document.createElement('a');
  a2.href=url;a2.download='relatorio_torre_olimpo_'+todayStr+'.html';
  document.body.appendChild(a2);a2.click();document.body.removeChild(a2);
  setTimeout(()=>URL.revokeObjectURL(url),5000);
  document.getElementById('preview-area').innerHTML=`<div class="succ-banner"><i class="ti ti-circle-check" aria-hidden="true"></i><div>Relatório gerado com sucesso!<br><small>${andSel.length} andares · ${tot} serviços · Abra o arquivo e use "Imprimir" para salvar como PDF.</small></div></div>`;
}

// ── Lightbox ──────────────────────────────────────────────────
let lbPh=[],lbIdx=0;
function openLBS(a,e,i){lbPh=(D[key(a,e)]&&D[key(a,e)].fotos)||[];lbIdx=i;showLB();}
function openLBM(i){lbPh=mphotos;lbIdx=i;showLB();}
function showLB(){
  if(!lbPh.length) return;
  document.getElementById('lb-img').src=lbPh[lbIdx].url || lbPh[lbIdx].src;
  document.getElementById('lb-cap').textContent=(lbIdx+1)+'/'+lbPh.length;
  document.getElementById('lb-prev').style.display=lbPh.length>1?'flex':'none';
  document.getElementById('lb-next').style.display=lbPh.length>1?'flex':'none';
  document.getElementById('lightbox').classList.add('open');
}
function closeLB(){document.getElementById('lightbox').classList.remove('open');}
function lbNav(d){lbIdx=(lbIdx+d+lbPh.length)%lbPh.length;document.getElementById('lb-img').src=lbPh[lbIdx].url||lbPh[lbIdx].src;document.getElementById('lb-cap').textContent=(lbIdx+1)+'/'+lbPh.length;}

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg,type='ok'){
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';t.style.cssText='position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:#1A237E;color:#fff;padding:10px 18px;border-radius:99px;font-size:13px;font-weight:600;z-index:300;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:opacity .3s';document.querySelector('.app').appendChild(t);}
  t.style.background=type==='error'?'#B71C1C':'#1A237E';
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._to);t._to=setTimeout(()=>{t.style.opacity='0';},2500);
}

// ── Navigation ────────────────────────────────────────────────
function showPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bn-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
  if(n==='relatorio') renderRelChecklist();
}

function renderAll(){renderAndamento();renderDashboard();renderAlertas();renderFotos();}

// ── Init ──────────────────────────────────────────────────────
initD();
renderAll();
if(checkSession()){
  loadFromSheets();
}
</script>
